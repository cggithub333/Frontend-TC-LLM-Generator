name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Deploy (restart container)
        if: github.event_name == 'push'
        run: |
          docker build -t frontend-tc-llm-generator:latest .
          docker stop frontend-tc-llm || true
          docker rm frontend-tc-llm || true
          docker run -d \
            --name frontend-tc-llm \
            --restart unless-stopped \
            -p 3000:3000 \
            frontend-tc-llm-generator:latest
