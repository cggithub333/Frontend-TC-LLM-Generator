services:
  # ── Next.js Frontend ──────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
